<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wellness">
<title>Wellness Scale — Qatar NT</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon: #8B1A1A;
    --maroon-dark: #5C0F0F;
    --maroon-light: #B22222;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --bg: #F4F1EE;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #DDD8D0;
    --text: #1A1A1A;
    --text-muted: #888;
    --green: #2E7D32;
    --yellow: #F9A825;
    --orange: #E65100;
    --red: #C62828;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon) 60%, var(--maroon-light) 100%);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    border-bottom: 2px solid var(--gold);
  }

  .header-left h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }

  .header-left p {
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .date-pill {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  #dateDisplay {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold-light);
    cursor: pointer;
    border-bottom: 1px dashed var(--gold);
    padding-bottom: 1px;
  }

  #dateInput {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    background: var(--maroon-dark);
    border: 1px solid var(--gold);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 8px;
    display: none;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary { background: var(--maroon); color: #fff; border: 1px solid var(--maroon-light); }
  .btn-primary:active { background: var(--maroon-dark); transform: scale(0.97); }

  .btn-gold { background: var(--gold); color: #1a1a1a; }
  .btn-gold:active { background: var(--gold-light); transform: scale(0.97); }

  .btn-danger { background: #fff0f0; color: #c62828; border: 1px solid #ffcdd2; }
  .btn-danger:active { background: #ffebee; transform: scale(0.97); }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .stat-item {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--maroon);
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  /* TABLE CONTAINER */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    min-width: 620px;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 2px solid var(--maroon);
  }

  th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--maroon);
    padding: 10px 8px;
    text-align: left;
    white-space: nowrap;
  }

  th:first-child { padding-left: 16px; width: 36%; }
  th.metric-col { width: 12%; text-align: center; }
  th.comment-col { width: 28%; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:nth-child(even) { background: #FAF8F5; }
  tbody tr:hover { background: rgba(139,26,26,0.06); }

  td {
    padding: 6px 8px;
    vertical-align: middle;
  }

  td:first-child {
    padding-left: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text);
  }

  td.metric-td { text-align: center; }

  /* TICK COLUMN */
  th.tick-col { width: 40px; text-align: center; }
  td.tick-td { text-align: center; vertical-align: middle; }

  .tick-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .tick-btn.ticked {
    background: #E8F5E9;
    border-color: #2E7D32;
  }

  /* NUMBER INPUT */
  .score-input {
    width: 52px;
    height: 38px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    display: inline-block;
  }

  .score-input:focus {
    border-color: var(--maroon);
    background: #fff8f0;
  }

  .score-input.val-green  { border-color: var(--green);  color: var(--green);  background: #E8F5E9; }
  .score-input.val-yellow { border-color: var(--yellow); color: #7a5200;       background: #FFFDE7; }
  .score-input.val-orange { border-color: var(--orange); color: var(--orange); background: #FFF3E0; }
  .score-input.val-red    { border-color: var(--red);    color: var(--red);    background: #FFEBEE; }

  .comment-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
    resize: none;
    height: 36px;
    transition: border-color 0.15s;
  }

  .comment-input:focus { border-color: var(--maroon); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--maroon);
    border-radius: 12px;
    padding: 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  .modal h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--maroon);
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--maroon);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 16px rgba(139,26,26,0.3);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Wellness Scale</h1>
    <p>Qatar National Team</p>
  </div>
  <div class="date-pill">
    <span id="dateDisplay" onclick="toggleDate()">—</span>
    <input type="date" id="dateInput" onchange="updateDate(this.value)" />
  </div>
</header>

<div class="toolbar">
  <button class="btn btn-gold" onclick="exportCSV()">⬇ Export CSV</button>
  <button class="btn btn-primary" onclick="exportPDF()">📄 Export PDF</button>
  <button class="btn btn-danger" onclick="showResetModal()">↺ Reset</button>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-value" id="statFilled">0</div>
    <div class="stat-label">Filled</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statAvgFatigue">—</div>
    <div class="stat-label">Avg Fatigue</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statAvgSoreness">—</div>
    <div class="stat-label">Avg Soreness</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statAvgSleep">—</div>
    <div class="stat-label">Avg Sleep</div>
  </div>
</div>

<div class="legend">
  <span class="legend-label">Score:</span>
  <span class="legend-item"><span class="legend-dot" style="background:#2E7D32"></span> 1–3 Low</span>
  <span class="legend-item"><span class="legend-dot" style="background:#F9A825"></span> 4 Moderate</span>
  <span class="legend-item"><span class="legend-dot" style="background:#E65100"></span> 5 High</span>
  <span class="legend-item"><span class="legend-dot" style="background:#C62828"></span> 6–7 Very High</span>
</div>

<div class="table-wrap">
  <table id="wellnessTable">
    <thead>
      <tr>
        <th>Player</th>
        <th class="tick-col"></th>
        <th class="metric-col">Fatigue</th>
        <th class="metric-col">Soreness</th>
        <th class="metric-col">Sleep</th>
        <th class="comment-col">Comment</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Reset Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>Reset All Data?</h3>
    <p>All scores and comments will be cleared. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn btn-danger" onclick="confirmReset()">Yes, Reset</button>
      <button class="btn btn-primary" onclick="hideResetModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>const PLAYERS = [
  "MAHMOUD ABUNADA","MESHAAL BARSHAM","SALAH ZAKARIA","SHEHAB ELLETHY",
  "ABDELAZIZ HATIM","AHMED ALAAEILDIN","AHMED ALGANEHI","AHMED FATHI",
  "AKRAM AFIF","ALHASHMI ALDIN","ALMOEZ ALI","ASSIM MADIBO",
  "AYOUB AL-OUI","BOUALEM KHOUKHI","EDMILSON JUNIOR",
  "GUAEYE LAYE","HASAN AL-HAYDOS","HOMAM AHMED","JASSEM GABER",
  "KARIM BOUDIAF","LUCAS MENDES","MOHAMMED ALMANAI",
  "MOHAMMED MUNTARI","PEDRO MIGUEL",
  "RAYYAN AHMED","SULTAN AL-BRAKE","TAHSIN JAMSHID","YUSUF YUSUF"
];

let data = {};
let currentDate = '';

function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function formatDate(str) {
  if (!str) return '—';
  const [y, m, d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d} ${months[parseInt(m)-1]} ${y}`;
}

function toggleDate() {
  const inp = document.getElementById('dateInput');
  const disp = document.getElementById('dateDisplay');
  if (inp.style.display === 'block') {
    inp.style.display = 'none';
    disp.style.display = 'block';
  } else {
    inp.value = currentDate;
    inp.style.display = 'block';
    disp.style.display = 'none';
    inp.focus();
  }
}

function updateDate(val) {
  currentDate = val;
  document.getElementById('dateDisplay').textContent = formatDate(val);
  document.getElementById('dateInput').style.display = 'none';
  document.getElementById('dateDisplay').style.display = 'block';
}

function initData() {
  PLAYERS.forEach(p => {
    if (!data[p]) data[p] = { tick: false, fatigue: '', soreness: '', sleep: '', comment: '' };
  });
}

function buildTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  PLAYERS.forEach(player => {
    const d = data[player];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${player}</td>
      <td class="tick-td"><button class="tick-btn ${d.tick ? 'ticked' : ''}" data-player="${player}" data-field="tick">${d.tick ? '✓' : ''}</button></td>
      <td class="metric-td"><input class="score-input" type="number" min="1" max="7" value="${d.fatigue}" placeholder="—" data-player="${player}" data-field="fatigue" inputmode="numeric"></td>
      <td class="metric-td"><input class="score-input" type="number" min="1" max="7" value="${d.soreness}" placeholder="—" data-player="${player}" data-field="soreness" inputmode="numeric"></td>
      <td class="metric-td"><input class="score-input" type="number" min="1" max="7" value="${d.sleep}" placeholder="—" data-player="${player}" data-field="sleep" inputmode="numeric"></td>
      <td><textarea class="comment-input" data-player="${player}" data-field="comment" placeholder="Note...">${d.comment}</textarea></td>
    `;
    tbody.appendChild(tr);
    ['fatigue','soreness','sleep'].forEach(f => {
      const inp = tr.querySelector(`[data-field="${f}"]`);
      if (d[f]) colorInput(inp, d[f]);
    });
  });

  tbody.querySelectorAll('.score-input').forEach(inp => {
    inp.addEventListener('input', function() {
      let v = parseInt(this.value);
      if (v < 1) { this.value = 1; v = 1; }
      if (v > 7) { this.value = 7; v = 7; }
      data[this.dataset.player][this.dataset.field] = this.value;
      colorInput(this, v);
      updateStats();
    });
  });

  tbody.querySelectorAll('.comment-input').forEach(inp => {
    inp.addEventListener('input', function() {
      data[this.dataset.player][this.dataset.field] = this.value;
    });
  });

  tbody.querySelectorAll('.tick-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const p = this.dataset.player;
      data[p].tick = !data[p].tick;
      this.classList.toggle('ticked', data[p].tick);
      this.textContent = data[p].tick ? '✓' : '';
    });
  });
}

function colorInput(inp, v) {
  inp.classList.remove('val-green','val-yellow','val-orange','val-red');
  v = parseInt(v);
  if (v <= 3) inp.classList.add('val-green');
  else if (v === 4) inp.classList.add('val-yellow');
  else if (v === 5) inp.classList.add('val-orange');
  else inp.classList.add('val-red');
}

function updateStats() {
  let filled = 0, fat = [], sor = [], slp = [];
  PLAYERS.forEach(p => {
    const d2 = data[p];
    const hasAny = d2.fatigue || d2.soreness || d2.sleep;
    if (hasAny) filled++;
    if (d2.fatigue) fat.push(parseFloat(d2.fatigue));
    if (d2.soreness) sor.push(parseFloat(d2.soreness));
    if (d2.sleep) slp.push(parseFloat(d2.sleep));
  });
  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '—';
  document.getElementById('statFilled').textContent = filled;
  document.getElementById('statAvgFatigue').textContent = avg(fat);
  document.getElementById('statAvgSoreness').textContent = avg(sor);
  document.getElementById('statAvgSleep').textContent = avg(slp);
}

function exportCSV() {
  const rows = [['Date','Player','Present','Fatigue','Soreness','Sleep','Comment']];
  PLAYERS.forEach(p => {
    const d2 = data[p];
    rows.push([currentDate, p, d2.tick ? 'YES' : '', d2.fatigue, d2.soreness, d2.sleep, `"${(d2.comment||'').replace(/"/g,'""')}"`]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wellness_${currentDate}_QatarNT.csv`;
  a.click();
  showToast('CSV exported ✓');
}

function showResetModal() { document.getElementById('resetModal').classList.add('active'); }
function hideResetModal() { document.getElementById('resetModal').classList.remove('active'); }

function confirmReset() {
  PLAYERS.forEach(p => { data[p] = { tick: false, fatigue:'', soreness:'', sleep:'', comment:'' }; });
  buildTable();
  updateStats();
  hideResetModal();
  showToast('Data reset ✓');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
currentDate = todayStr();
document.getElementById('dateDisplay').textContent = formatDate(currentDate);
initData();
buildTable();
updateStats();
